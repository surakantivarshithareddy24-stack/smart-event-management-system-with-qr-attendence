<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Smart Event Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h1>Smart Event Management</h1>
    <h2>Admin Login</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <div class="messages">
            {% for category, message in messages %}
                <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('admin_login') }}" class="card">
        <label for="email">Admin Email</label>
        <input type="email" id="email" name="email" placeholder="Enter admin email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required>

        <button type="submit">Login</button>
    </form>

    <p class="text-center">
        Student login?
        <a href="{{ url_for('login') }}">Go to Student Login</a>
    </p>
</div>
</body>
</html>
